name: Clean Study Note Wording

on:
  push:
    paths:
      - .github/workflows/clean-study-note-wording.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-wording:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace project wording in complete notes
        shell: python
        run: |
          from pathlib import Path

          path = Path('Complete CompTIA Security+ SY0-701 Study Notes.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'IT-related projects that are managed outside of, and without the knowledge of, the IT department': 'IT-related tools, systems, or initiatives that are managed outside of, and without the knowledge of, the IT department',
              'Conducted for specific projects or initiatives': 'Conducted for specific initiatives or business activities',
              'Crucial for projects and business, it involves the identification and assessment of uncertainties that may impact objectives': 'Crucial for business operations, it involves the identification and assessment of uncertainties that may impact objectives',
              'Key component of project and business operations': 'Key component of business and operational decision-making',
              'Financial impact on the project': 'Financial impact on the business activity',
              'Assess damage to project or business objectives': 'Assess damage to business or operational objectives',
              'resource allocation, project timelines, and strategic planning': 'resource allocation, operational timelines, and strategic planning',
              'Specifies project details, deliverables, timelines, and milestones': 'Specifies work details, deliverables, timelines, and milestones',
              'Provides in-depth project-related information': 'Provides in-depth work-related information',
              'Ensures changes do not create chaos and helps track project evolution': 'Ensures changes do not create chaos and helps track workflow evolution',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/clean-study-note-wording.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Complete CompTIA Security+ SY0-701 Study Notes.md" .github/workflows/clean-study-note-wording.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Clean study note wording"
            git push
          fi
